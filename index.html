<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 추첨기 & 동물상 테스트</title>
    <link rel="stylesheet" href="style.css">
    <!-- TensorFlow.js and Teachable Machine Image -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <div class="main-wrapper">
        <div class="container">
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
                <span id="theme-icon">🌙</span>
            </button>
            <h1>로또 번호 추첨기</h1>
            <div id="numbers-container"></div>
            <button id="generate-btn">번호 생성</button>
        </div>

        <!-- Animal Face Test Section -->
        <div class="container animal-test-container">
            <h2>나와 닮은 동물상 테스트</h2>
            <p class="subtitle">사진을 업로드하여 강아지상인지 고양이상인지 확인해보세요!</p>
            
            <div id="upload-area" class="upload-area">
                <input type="file" id="image-upload" accept="image/*" hidden>
                <label for="image-upload" class="upload-label">
                    <span class="upload-icon">📸</span>
                    <span class="upload-text">사진 업로드하기</span>
                </label>
            </div>

            <div id="loading-spinner" class="spinner hidden"></div>
            
            <div id="result-area" class="result-area hidden">
                <img id="preview-image" src="" alt="Preview">
                <div id="prediction-result" class="prediction-result"></div>
                <button id="retry-btn" class="secondary-btn">다시 하기</button>
            </div>
        </div>

        <div class="contact-section">
            <button id="toggle-contact-btn" class="secondary-btn">제휴 문의하기</button>
            
            <div id="contact-form-container" class="hidden">
                <form action="https://formspree.io/f/mjgedqqj" method="POST" class="contact-form">
                    <h3>제휴 문의</h3>
                    <div class="form-group">
                        <label for="email">이메일 주소</label>
                        <input type="email" id="email" name="email" required placeholder="example@email.com">
                    </div>
                    <div class="form-group">
                        <label for="message">문의 내용</label>
                        <textarea id="message" name="message" required placeholder="문의하실 내용을 입력해주세요."></textarea>
                    </div>
                    <button type="submit" class="submit-btn">문의 보내기</button>
                </form>
            </div>
        </div>

        <!-- Disqus Comments Section -->
        <div class="comments-section">
            <div id="disqus_thread"></div>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </div>
    </div>
    <script src="main.js" type="module"></script>
</body>
</html>
